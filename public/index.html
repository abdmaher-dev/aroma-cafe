<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aroma Cafe - القائمة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Hero ===== -->
  <header class="hero">
    <div class="hero-logo">
      <img src="images/coffee_logo.webp" alt="Aroma Cafe Logo" class="hero-logo-img" />
    </div>
    <h1 class="hero-title font">Aroma Cafe</h1>
    <p class="hero-subtitle font">Where Magic Happens</p>
  </header>

  <!-- ===== Tabs (تُبنى بواسطة app.js) ===== -->
  <div class="tabs-container">
    <div class="tabs" id="tabs">
      <!-- يتم إنشاؤها تلقائياً من menu.json -->
    </div>
  </div>

  <!-- ===== Sections (تُبنى بواسطة app.js) ===== -->
  <div id="sections">
    <!-- يتم إنشاؤها تلقائياً من menu.json -->
  </div>

  <!-- ===== Footer ===== -->
  <footer>
    <p>✨ مقهى الأحلام، حيث تتحقق الأحلام &copy; 2026</p>
  </footer>

  <!-- app.js يقرأ menu.json ويبني كل شيء -->
  <script src="app.js"></script>

</body>
</html>
